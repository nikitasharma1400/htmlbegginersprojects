<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MeTube - Watch</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/navbar.css"/>
  <link rel="stylesheet" href="css/sidebar.css"/>
  <link rel="stylesheet" href="css/watch.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="nav-left">
      <button id="menu-btn" aria-label="Menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
      </button>
      <a href="index.html" class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M10 16.5l6-4.5-6-4.5v9zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
        </div>
        <span class="logo-text">Me<span>Tube</span></span>
      </a>
    </div>

    <div class="nav-center">
      <form id="search-form">
        <input type="text" id="search-input" placeholder="Search" autocomplete="off"/>
        <button type="submit" class="search-btn" aria-label="Search">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
            <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
        </button>
      </form>
      <button id="voice-btn" aria-label="Search by voice">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
    </div>

    <div class="nav-right">
      <button class="nav-icon-btn" id="notif-btn" aria-label="Notifications">
        <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
        </svg>
        <span class="notif-dot"></span>
      </button>
      <img src="https://picsum.photos/seed/user/36/36" alt="User" class="user-avatar"/>
    </div>
  </nav>

  <!-- BODY -->
  <div class="app-shell">
    <aside id="sidebar">
      <div id="sidebar-overlay"></div>
      <div class="sidebar-section">
        <a href="index.html" class="sidebar-link">
          <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          <span>Home</span>
        </a>
        <a href="search.html" class="sidebar-link">
          <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <span>Explore</span>
        </a>
        <a href="#" class="sidebar-link">
          <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <span>Shorts</span>
        </a>
        <a href="#" class="sidebar-link">
          <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 8h-3v3h-2v-3H10V8h3V5h2v3h3v2z"/></svg>
          <span>Subscriptions</span>
        </a>
      </div>
      <div class="sidebar-section">
        <p class="sidebar-section-label">You</p>
        <a href="#" class="sidebar-link">
          <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
          <span>History</span>
        </a>
        <a href="#" class="sidebar-link">
          <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M22 16V4c0-1.1-.9-2-2-2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2zm-11-4l2.03 2.71L16 11l4 5H8l3-4zM2 6v14c0 1.1.9 2 2 2h14v-2H4V6H2z"/></svg>
          <span>Playlists</span>
        </a>
        <a href="#" class="sidebar-link">
          <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.27 2 8.5 2 5.41 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.41 22 8.5c0 3.77-3.4 6.86-8.55 11.53L12 21.35z"/></svg>
          <span>Liked Videos</span>
        </a>
      </div>
    </aside>

    <main class="main-content">
      <div class="watch-page">

        <!-- Left: Player + Info -->
        <section class="player-section">

          <!-- Video Player -->
          <div class="video-player-wrap">
            <div class="video-placeholder">
              <svg width="60" height="60" fill="#ff3c3c" viewBox="0 0 24 24"><path d="M10 16.5l6-4.5-6-4.5v9zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
              <span>Video playback area</span>
            </div>
          </div>

          <!-- Video Info -->
          <div class="video-info">
            <h1 id="video-title">Loading...</h1>

            <div class="video-actions">
              <span id="video-views"></span>
              <div class="action-btns">
                <button class="action-btn" id="like-btn">
                  <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
                  <span id="like-count">42K</span>
                </button>
                <button class="action-btn">
                  <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M23 7l-7 4 7 4V7zm-14 5c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zM1 18h12V6H1v12zm2-2V8h8v8H3z"/></svg>
                  Share
                </button>
                <button class="action-btn">
                  <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                  Download
                </button>
                <button class="action-btn">
                  <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                  More
                </button>
              </div>
            </div>

            <!-- Channel Info -->
            <div class="channel-info">
              <div class="channel-left">
                <img id="channel-avatar" src="" alt="Channel"/>
                <div>
                  <p id="channel-name"></p>
                  <p id="channel-subs"></p>
                </div>
              </div>
              <button class="subscribe-btn" onclick="this.classList.toggle('subscribed'); this.textContent = this.classList.contains('subscribed') ? 'Subscribed' : 'Subscribe'">Subscribe</button>
            </div>

            <!-- Description -->
            <div class="description-box">
              <div id="video-tags"></div>
              <p id="video-description"></p>
              <button id="desc-toggle">Show more</button>
            </div>
          </div>

          <!-- Comments -->
          <div class="comments-section">
            <h3>Comments</h3>
            <div class="comment-input-row">
              <img src="https://picsum.photos/seed/user/36/36" alt="You"/>
              <input type="text" placeholder="Add a comment..."/>
            </div>
            <div id="comments-list"></div>
          </div>
        </section>

        <!-- Right: Related Videos -->
        <aside class="related-section">
          <h3>Up next</h3>
          <div id="related-videos"></div>
        </aside>

      </div>
    </main>
  </div>

  <script src="js/navbar.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/watch.js"></script>
</body>
</html>
