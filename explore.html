<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gato — Explore</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/explore.css" />
</head>
<body>
  <div class="app-shell">

    <aside class="sidebar">
      <div class="sidebar-logo">gat<span>o</span></div>
      <nav>
        <a href="index.html" class="nav-item">
          <span class="icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
          Home
        </a>
        <a href="explore.html" class="nav-item active">
          <span class="icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
          Explore
        </a>
        <a href="#" class="nav-item">
          <span class="icon"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg></span>
          Reels
        </a>
        <a href="#" class="nav-item">
          <span class="icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
          Messages
          <span class="badge">3</span>
        </a>
        <a href="#" class="nav-item">
          <span class="icon"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></span>
          Activity
        </a>
        <a href="profile.html" class="nav-item">
          <span class="icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          Profile
        </a>
        <a href="#" class="nav-item">
          <span class="icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></span>
          Create
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="profile.html" class="sidebar-user">
          <div class="avatar">
            <img src="https://i.pravatar.cc/100?img=12" alt="you">
          </div>
          <div class="info">
            <div class="name">you</div>
            <div class="handle">@yourhandle</div>
          </div>
        </a>
      </div>
    </aside>

    <main class="main-content">
      <div class="explore-layout">

        <div class="explore-search">
          <span class="search-icon">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <input type="text" placeholder="Search Gato..." id="search-input" oninput="filterExplore(this.value)" />
        </div>

        <div class="category-pills">
          <button class="pill active" onclick="setCategory(this, 'all')">All</button>
          <button class="pill" onclick="setCategory(this, 'photos')">Photos</button>
          <button class="pill" onclick="setCategory(this, 'reels')">Reels</button>
          <button class="pill" onclick="setCategory(this, 'travel')">Travel</button>
          <button class="pill" onclick="setCategory(this, 'art')">Art</button>
          <button class="pill" onclick="setCategory(this, 'food')">Food</button>
          <button class="pill" onclick="setCategory(this, 'nature')">Nature</button>
          <button class="pill" onclick="setCategory(this, 'music')">Music</button>
          <button class="pill" onclick="setCategory(this, 'fashion')">Fashion</button>
        </div>

        <div class="explore-grid" id="explore-grid">

          <div class="explore-post tall" onclick="showToast('Opening post...')">
            <div class="ep-inner">
              <div class="ep-content bg-1">🌸</div>
              <div class="ep-overlay">
                <div class="ep-stat"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>12.4k</div>
                <div class="ep-stat"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>348</div>
              </div>
            </div>
          </div>

          <div class="explore-post" onclick="showToast('Opening post...')">
            <div class="ep-inner">
              <div class="ep-content bg-2">🌊</div>
              <div class="ep-overlay">
                <div class="ep-stat"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>8.9k</div>
                <div class="ep-stat"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>210</div>
              </div>
            </div>
          </div>

          <div class="explore-post" onclick="showToast('Opening post...')">
            <div class="ep-inner">
              <div class="ep-content bg-3">🎨</div>
              <div class="ep-overlay">
                <div class="ep-stat"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>5.2k</div>
                <div class="ep-stat"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>99</div>
              </div>
            </div>
          </div>

          <div class="explore-post wide" onclick="showToast('Opening post...')">
            <div class="ep-inner">
              <div class="ep-content bg-4">🏙️</div>
              <div class="ep-overlay">
                <div class="ep-stat"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>22.1k</div>
                <div class="ep-stat"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>744</div>
              </div>
            </div>
          </div>

          <div class="explore-post" onclick="showToast('Opening post...')">
            <div class="ep-inner">
              <div class="ep-content bg-5">🌙</div>
              <div class="ep-overlay">
                <div class="ep-stat"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>7.3k</div>
                <div class="ep-stat"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>188</div>
              </div>
            </div>
          </div>

          <div class="explore-post" onclick="showToast('Opening post...')">
            <div class="ep-inner">
              <div class="ep-content bg-6">🐱</div>
              <div class="ep-overlay">
                <div class="ep-stat"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>31.8k</div>
                <div class="ep-stat"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>1.2k</div>
              </div>
            </div>
          </div>

          <div class="explore-post tall" onclick="showToast('Opening post...')">
            <div class="ep-inner">
              <div class="ep-content bg-2">☕</div>
              <div class="ep-overlay">
                <div class="ep-stat"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>4.7k</div>
                <div class="ep-stat"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>112</div>
              </div>
            </div>
          </div>

          <div class="explore-post" onclick="showToast('Opening post...')">
            <div class="ep-inner">
              <div class="ep-content bg-4">🌿</div>
              <div class="ep-overlay">
                <div class="ep-stat"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>9.1k</div>
                <div class="ep-stat"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>267</div>
              </div>
            </div>
          </div>

          <div class="explore-post" onclick="showToast('Opening post...')">
            <div class="ep-inner">
              <div class="ep-content bg-1">🎵</div>
              <div class="ep-overlay">
                <div class="ep-stat"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>6.4k</div>
                <div class="ep-stat"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>144</div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </main>
  </div>

  <nav class="mobile-nav">
    <a href="index.html" class="mobile-nav-item">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="explore.html" class="mobile-nav-item active">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Explore
    </a>
    <a href="#" class="mobile-nav-item" onclick="showToast('Create post')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Create

    <a href="#" class="mobile-nav-item">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>

    <a href="profile.html" class="mobile-nav-item">
